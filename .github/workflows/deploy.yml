name: XingCam Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_release:
    name: Build & Sovereign Zero-Error Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Java JRE/JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install Android NDK Targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Resolve Deep Dependencies
        run: flutter pub get

      - name: Generate Isar & Injectable Metadata
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Compile Native Rust Libraries (cargo-ndk)
        working-directory: ./rust
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -o ../android/app/src/main/jniLibs build --release

      - name: Sovereign Static Analysis Check (Must be 0-Error)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Build Android App Bundle (AAB) with R8/ProGuard
        run: flutter build appbundle --release --obfuscate --split-debug-info=./debug_info

      - name: Play Store Upload (Fastlane Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: \${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.example.xingcam
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
